<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atminimas – šablonas (nuotraukos, krenta žemyn)</title>
<style>
:root {
  --miniatiuros-santykis: 3 / 4;
  --miniatiuros-max-aukstis: min(52vh, 400px);
  --krenta-trukme: 0.75s;
  --krenta-zingsnis: 0.14s;
}
html {
  margin: 0;
  min-height: 100%;
  background-color: #2a2a2a;
  background-image: url("Nuotraukos/BG.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}
body {
  margin: 0 5%;
  min-height: 100vh;
  box-sizing: border-box;
}
/* Visos nuotraukos stulpeliu; įėjimas – krenta žemyn (pakopomis) */
.nuotraukos-krenta {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  background: rgba(255, 255, 255, 0.3);
}
.nuotraukos-krenta .nuotrauka-kortele {
  position: relative;
  box-sizing: border-box;
  width: 100%;
  aspect-ratio: var(--miniatiuros-santykis);
  max-height: var(--miniatiuros-max-aukstis);
  overflow: hidden;
  border: 1px solid #b8b8b8;
  cursor: pointer;
  opacity: 0;
  transform: translateY(-2rem);
  animation: nuotrauka-krenta-zemyn var(--krenta-trukme) cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.nuotraukos-krenta .nuotrauka-kortele:nth-child(1) { animation-delay: calc(var(--krenta-zingsnis) * 0); }
.nuotraukos-krenta .nuotrauka-kortele:nth-child(2) { animation-delay: calc(var(--krenta-zingsnis) * 1); }
.nuotraukos-krenta .nuotrauka-kortele:nth-child(3) { animation-delay: calc(var(--krenta-zingsnis) * 2); }
.nuotraukos-krenta .nuotrauka-kortele:nth-child(4) { animation-delay: calc(var(--krenta-zingsnis) * 3); }
.nuotraukos-krenta .nuotrauka-kortele:nth-child(5) { animation-delay: calc(var(--krenta-zingsnis) * 4); }
.nuotraukos-krenta .nuotrauka-kortele:nth-child(6) { animation-delay: calc(var(--krenta-zingsnis) * 5); }
.nuotraukos-krenta .nuotrauka-kortele:nth-child(7) { animation-delay: calc(var(--krenta-zingsnis) * 6); }
.nuotraukos-krenta .nuotrauka-kortele:nth-child(8) { animation-delay: calc(var(--krenta-zingsnis) * 7); }
.nuotraukos-krenta .nuotrauka-kortele:nth-child(9) { animation-delay: calc(var(--krenta-zingsnis) * 8); }
.nuotraukos-krenta .nuotrauka-kortele:nth-child(10) { animation-delay: calc(var(--krenta-zingsnis) * 9); }
@keyframes nuotrauka-krenta-zemyn {
  from {
    opacity: 0;
    transform: translateY(-2rem);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
@media (prefers-reduced-motion: reduce) {
  .nuotraukos-krenta .nuotrauka-kortele {
    animation: none;
    opacity: 1;
    transform: none;
  }
}
.nuotraukos-krenta .nuotrauka-kortele img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  pointer-events: none;
}
.nuotraukos-krenta .nuotrauka-kortele img.pixel-art,
#gallery-inner img.pixel-art {
  image-rendering: crisp-edges;
  image-rendering: pixelated;
}
/* Antraštė – tekstas skaitomas ant BG (puslapio fonas – html) */
.antmastis {
  position: relative;
  margin: 0 0 1rem;
  padding: 1.25rem 0.75rem;
  overflow: hidden;
  border-radius: 6px;
  background: transparent;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
}
.antmastis h2,
.antmastis h4,
.antmastis h5 {
  position: relative;
  z-index: 1;
  text-align: center;
  margin: 0.35em 0;
  text-shadow: 0 0 12px rgba(255, 255, 255, 0.9), 0 1px 2px rgba(0, 0, 0, 0.15);
}
#gallery-inner {
  scroll-behavior: smooth;
  overflow-x: hidden;
  touch-action: pan-y;
}
.gallery-nav {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 1001;
  color: #fff;
  font-size: 3rem;
  line-height: 1;
  cursor: pointer;
  user-select: none;
  padding: 0.25em 0.4em;
  background: rgba(0,0,0,0.35);
  border: none;
  font-family: inherit;
}
.gallery-nav:hover {
  background: rgba(255,255,255,0.15);
}
.gallery-nav:disabled {
  opacity: 0.25;
  cursor: default;
}
.gallery-prev { left: 8px; }
.gallery-next { right: 8px; }
</style>
</head>
<body>

<section class="antmastis" id="antmastis" aria-label="Antraštė">
  <h2>VARDAS PAVARDĖ</h2>
  <h4>Gimimo data – mirties data</h4>
  <h5>EPITAFIJA</h5>
</section>

<!--
  Visos nuotraukos matomos (viena po kitos).
  Pridėk / ištrink .nuotrauka-kortele blokus; galerijoje #gallery-inner – tie patys <img> eilės tvarka ir tiek pat.
-->
<div id="nuotraukos" class="nuotraukos-krenta">
  <div class="nuotrauka-kortele" role="button" tabindex="0" onclick="openGallery(0)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openGallery(0);}"><img src="Nuotraukos/lol.jpg" alt=""></div>
  <div class="nuotrauka-kortele" role="button" tabindex="0" onclick="openGallery(1)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openGallery(1);}"><img src="Nuotraukos/Idle_pygame.png" class="pixel-art" alt=""></div>
  <div class="nuotrauka-kortele" role="button" tabindex="0" onclick="openGallery(2)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openGallery(2);}"><img src="Nuotraukos/nuotrauka-3.jpg" alt=""></div>
</div>

<div id="gallery" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:999;">
  <span onclick="closeGallery()" style="position:fixed; top:10px; right:15px; color:white; font-size:35px; cursor:pointer; z-index:1000;">✕</span>
  <button type="button" class="gallery-nav gallery-prev" id="gallery-prev" onclick="event.stopPropagation(); galleryPrev();" aria-label="Ankstesnė nuotrauka">&lt;</button>
  <button type="button" class="gallery-nav gallery-next" id="gallery-next" onclick="event.stopPropagation(); galleryNext();" aria-label="Kita nuotrauka">&gt;</button>
  <div id="gallery-inner" style="display:flex; height:100%; scroll-snap-type:x mandatory;">
    <img src="Nuotraukos/lol.jpg" style="min-width:100%; height:100%; object-fit:contain; scroll-snap-align:start;" alt="">
    <img src="Nuotraukos/Idle_pygame.png" class="pixel-art" style="min-width:100%; height:100%; object-fit:contain; scroll-snap-align:start;" alt="">
    <img src="Nuotraukos/nuotrauka-3.jpg" style="min-width:100%; height:100%; object-fit:contain; scroll-snap-align:start;" alt="">
  </div>
</div>

<script>
var galleryIndex = 0;
var gallerySwipeStartX = null;
var gallerySwipeStartY = null;

function galleryBindSwipe() {
  var el = document.getElementById("gallery-inner");
  if (!el || el.dataset.swipeBound === "1") return;
  el.dataset.swipeBound = "1";
  function onStart(clientX, clientY) {
    gallerySwipeStartX = clientX;
    gallerySwipeStartY = clientY;
  }
  function onEnd(clientX, clientY) {
    if (gallerySwipeStartX == null) return;
    var dx = clientX - gallerySwipeStartX;
    var dy = clientY - gallerySwipeStartY;
    gallerySwipeStartX = null;
    gallerySwipeStartY = null;
    if (document.getElementById("gallery").style.display === "none") return;
    var minMove = 50;
    if (Math.abs(dx) < minMove || Math.abs(dx) < Math.abs(dy)) return;
    if (dx < 0) galleryNext();
    else galleryPrev();
  }
  el.addEventListener("pointerdown", function (e) {
    if (e.pointerType === "mouse" && e.button !== 0) return;
    try { el.setPointerCapture(e.pointerId); } catch (err) {}
    onStart(e.clientX, e.clientY);
  });
  el.addEventListener("pointerup", function (e) {
    if (e.pointerType === "mouse" && e.button !== 0) return;
    try { el.releasePointerCapture(e.pointerId); } catch (err) {}
    onEnd(e.clientX, e.clientY);
  });
  el.addEventListener("pointercancel", function () {
    gallerySwipeStartX = null;
    gallerySwipeStartY = null;
  });
}
galleryBindSwipe();

function galleryImageCount() {
  return document.getElementById("gallery-inner").querySelectorAll("img").length;
}
function galleryScrollToIndex(instant) {
  var inner = document.getElementById("gallery-inner");
  var w = inner.clientWidth;
  var left = galleryIndex * w;
  if (instant) {
    inner.style.scrollBehavior = "auto";
    inner.scrollLeft = left;
    inner.style.scrollBehavior = "";
  } else {
    inner.scrollTo({ left: left, behavior: "smooth" });
  }
  galleryUpdateNavButtons();
}
function galleryUpdateNavButtons() {
  var n = galleryImageCount();
  var prevBtn = document.getElementById("gallery-prev");
  var nextBtn = document.getElementById("gallery-next");
  if (prevBtn) prevBtn.disabled = galleryIndex <= 0;
  if (nextBtn) nextBtn.disabled = galleryIndex >= n - 1;
}
function galleryPrev() {
  if (galleryIndex > 0) {
    galleryIndex--;
    galleryScrollToIndex(false);
  }
}
function galleryNext() {
  var n = galleryImageCount();
  if (galleryIndex < n - 1) {
    galleryIndex++;
    galleryScrollToIndex(false);
  }
}
function openGallery(index) {
  var gallery = document.getElementById("gallery");
  gallery.style.display = "block";
  document.body.style.overflow = "hidden";
  galleryIndex = Math.max(0, Math.min(index, galleryImageCount() - 1));
  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      galleryScrollToIndex(true);
    });
  });
}
function closeGallery() {
  document.getElementById("gallery").style.display = "none";
  document.body.style.overflow = "";
}
</script>

</body>
</html>
