<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atminimas – šablonas (3 nuotraukos + 1 video)</title>
<style>
:root {
  --miniatiuros-santykis: 3 / 4;
  --miniatiuros-max-aukstis: min(52vh, 400px);
  --krenta-trukme: 0.75s;
  --krenta-zingsnis: 0.14s;
}
html {
  margin: 0;
  min-height: 100%;
  background-color: #2a2a2a;
  background-image: url("Nuotraukos/BG.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}
body {
  margin: 0 5%;
  min-height: 100vh;
  box-sizing: border-box;
  background: rgba(255, 255, 255, 0.9);
}
.antmastis {
  position: relative;
  margin: 0 0 1rem;
  padding: 1.25rem 0.75rem;
  overflow: hidden;
  border-radius: 6px;
  background: transparent;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
}
.antmastis h2,
.antmastis h4,
.antmastis h5 {
  position: relative;
  z-index: 1;
  text-align: center;
  margin: 0.35em 0;
  text-shadow: 0 0 12px rgba(255, 255, 255, 0.9), 0 1px 2px rgba(0, 0, 0, 0.15);
}
.nuotraukos-krenta {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
}
.nuotraukos-krenta .nuotrauka-kortele {
  position: relative;
  box-sizing: border-box;
  width: 100%;
  aspect-ratio: var(--miniatiuros-santykis);
  max-height: var(--miniatiuros-max-aukstis);
  overflow: hidden;
  border: 1px solid #b8b8b8;
  cursor: pointer;
  opacity: 0;
  transform: translateY(-2rem);
  animation: nuotrauka-krenta-zemyn var(--krenta-trukme) cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.nuotraukos-krenta .nuotrauka-kortele:nth-child(1) { animation-delay: calc(var(--krenta-zingsnis) * 0); }
.nuotraukos-krenta .nuotrauka-kortele:nth-child(2) { animation-delay: calc(var(--krenta-zingsnis) * 1); }
.nuotraukos-krenta .nuotrauka-kortele:nth-child(3) { animation-delay: calc(var(--krenta-zingsnis) * 2); }
@keyframes nuotrauka-krenta-zemyn {
  from {
    opacity: 0;
    transform: translateY(-2rem);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
@media (prefers-reduced-motion: reduce) {
  .nuotraukos-krenta .nuotrauka-kortele {
    animation: none;
    opacity: 1;
    transform: none;
  }
}
.nuotraukos-krenta .nuotrauka-kortele img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  pointer-events: none;
}
.nuotraukos-krenta .nuotrauka-kortele img.pixel-art,
#gallery-inner img.pixel-art {
  image-rendering: crisp-edges;
  image-rendering: pixelated;
}
.turinys-video {
  max-width: 560px;
  margin: 1.25rem auto 0;
}
.video-fs-wrap {
  position: relative;
  width: 100%;
  background: #111;
}
.video-fs-wrap video {
  display: block;
  width: 100%;
  height: 200px;
  object-fit: contain;
}
.video-fs-play {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(120px, 30vw);
  height: min(120px, 30vw);
  border-radius: 50%;
  border: none;
  margin: 0;
  padding: 0 0 0 0.2em;
  background: rgba(255, 255, 255, 0.95);
  color: #111;
  font-size: clamp(2.2rem, 10vw, 3.8rem);
  line-height: 1;
  cursor: pointer;
  z-index: 3;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 28px rgba(0, 0, 0, 0.45);
}
.video-fs-play:hover {
  background: #fff;
}
.video-fs-play[hidden] {
  display: none !important;
}
.video-fs-close {
  position: absolute;
  top: 10px;
  right: 12px;
  z-index: 10;
  width: 48px;
  height: 48px;
  border: none;
  border-radius: 50%;
  margin: 0;
  padding: 0;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  font-size: 1.75rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.video-fs-close:hover {
  background: rgba(255, 255, 255, 0.2);
}
.video-fs-close[hidden] {
  display: none !important;
}
.video-fs-wrap:fullscreen,
.video-fs-wrap:-webkit-full-screen,
.video-fs-wrap.fs-fake {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: center;
  width: 100%;
  height: 100%;
  min-height: 100vh;
  box-sizing: border-box;
  background: #000;
}
.video-fs-wrap:fullscreen video,
.video-fs-wrap:-webkit-full-screen video,
.video-fs-wrap.fs-fake video {
  flex: 1;
  min-height: 0;
  width: 100%;
  height: auto;
  max-height: 100vh;
  object-fit: contain;
}
.video-fs-wrap.fs-fake {
  position: fixed;
  inset: 0;
  z-index: 99990;
}
#gallery-inner {
  scroll-behavior: smooth;
  overflow-x: hidden;
  touch-action: pan-y;
}
.gallery-nav {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 100001;
  color: #fff;
  font-size: 3rem;
  line-height: 1;
  cursor: pointer;
  user-select: none;
  padding: 0.25em 0.4em;
  background: rgba(0,0,0,0.35);
  border: none;
  font-family: inherit;
}
.gallery-nav:hover {
  background: rgba(255,255,255,0.15);
}
.gallery-nav:disabled {
  opacity: 0.25;
  cursor: default;
}
.gallery-prev { left: 8px; }
.gallery-next { right: 8px; }
</style>
</head>
<body>

<section class="antmastis" id="antmastis" aria-label="Antraštė">
  <h2>VARDAS PAVARDĖ</h2>
  <h4>Gimimo data – mirties data</h4>
  <h5>EPITAFIJA</h5>
</section>

<!-- 3 nuotraukos: keliai ir galerijoje turi sutapti -->
<div id="nuotraukos" class="nuotraukos-krenta">
  <div class="nuotrauka-kortele" role="button" tabindex="0" onclick="openGallery(0)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openGallery(0);}"><img src="Nuotraukos/S_pirma.jpg" alt=""></div>
  <div class="nuotrauka-kortele" role="button" tabindex="0" onclick="openGallery(1)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openGallery(1);}"><img src="Nuotraukos/S_antra.jpg" class="pixel-art" alt=""></div>
  <div class="nuotrauka-kortele" role="button" tabindex="0" onclick="openGallery(2)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openGallery(2);}"><img src="Nuotraukos/S_trecia.jpg" alt=""></div>
</div>

<!-- 1 video: pakeisk kelią prie <source> -->
<div class="turinys-video">
  <div class="video-fs-wrap">
    <video playsinline controls>
      <source src="Nuotraukos/video.mp4" type="video/mp4">
    </video>
    <button type="button" class="video-fs-play" aria-label="Visas ekranas">▶</button>
    <button type="button" class="video-fs-close" hidden aria-label="Išeiti iš viso ekrano">✕</button>
  </div>
</div>

<div id="gallery" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:100000;">
  <span onclick="closeGallery()" style="position:fixed; top:10px; right:15px; color:white; font-size:35px; cursor:pointer; z-index:100002;">✕</span>
  <button type="button" class="gallery-nav gallery-prev" id="gallery-prev" onclick="event.stopPropagation(); galleryPrev();" aria-label="Ankstesnė nuotrauka">&lt;</button>
  <button type="button" class="gallery-nav gallery-next" id="gallery-next" onclick="event.stopPropagation(); galleryNext();" aria-label="Kita nuotrauka">&gt;</button>
  <div id="gallery-inner" style="display:flex; height:100%; scroll-snap-type:x mandatory;">
    <img src="Nuotraukos/S_pirma.jpg" style="min-width:100%; height:100%; object-fit:contain; scroll-snap-align:start;" alt="">
    <img src="Nuotraukos/S_antra.jpg" class="pixel-art" style="min-width:100%; height:100%; object-fit:contain; scroll-snap-align:start;" alt="">
    <img src="Nuotraukos/S_trecia.jpg" style="min-width:100%; height:100%; object-fit:contain; scroll-snap-align:start;" alt="">
  </div>
</div>

<script>
var galleryIndex = 0;
var gallerySwipeStartX = null;
var gallerySwipeStartY = null;

function galleryBindSwipe() {
  var el = document.getElementById("gallery-inner");
  if (!el || el.dataset.swipeBound === "1") return;
  el.dataset.swipeBound = "1";
  function onStart(clientX, clientY) {
    gallerySwipeStartX = clientX;
    gallerySwipeStartY = clientY;
  }
  function onEnd(clientX, clientY) {
    if (gallerySwipeStartX == null) return;
    var dx = clientX - gallerySwipeStartX;
    var dy = clientY - gallerySwipeStartY;
    gallerySwipeStartX = null;
    gallerySwipeStartY = null;
    if (document.getElementById("gallery").style.display === "none") return;
    var minMove = 50;
    if (Math.abs(dx) < minMove || Math.abs(dx) < Math.abs(dy)) return;
    if (dx < 0) galleryNext();
    else galleryPrev();
  }
  el.addEventListener("pointerdown", function (e) {
    if (e.pointerType === "mouse" && e.button !== 0) return;
    try { el.setPointerCapture(e.pointerId); } catch (err) {}
    onStart(e.clientX, e.clientY);
  });
  el.addEventListener("pointerup", function (e) {
    if (e.pointerType === "mouse" && e.button !== 0) return;
    try { el.releasePointerCapture(e.pointerId); } catch (err) {}
    onEnd(e.clientX, e.clientY);
  });
  el.addEventListener("pointercancel", function () {
    gallerySwipeStartX = null;
    gallerySwipeStartY = null;
  });
}
galleryBindSwipe();

function galleryImageCount() {
  return document.getElementById("gallery-inner").querySelectorAll("img").length;
}
function galleryScrollToIndex(instant) {
  var inner = document.getElementById("gallery-inner");
  var w = inner.clientWidth;
  var left = galleryIndex * w;
  if (instant) {
    inner.style.scrollBehavior = "auto";
    inner.scrollLeft = left;
    inner.style.scrollBehavior = "";
  } else {
    inner.scrollTo({ left: left, behavior: "smooth" });
  }
  galleryUpdateNavButtons();
}
function galleryUpdateNavButtons() {
  var n = galleryImageCount();
  var prevBtn = document.getElementById("gallery-prev");
  var nextBtn = document.getElementById("gallery-next");
  if (prevBtn) prevBtn.disabled = galleryIndex <= 0;
  if (nextBtn) nextBtn.disabled = galleryIndex >= n - 1;
}
function galleryPrev() {
  if (galleryIndex > 0) {
    galleryIndex--;
    galleryScrollToIndex(false);
  }
}
function galleryNext() {
  var n = galleryImageCount();
  if (galleryIndex < n - 1) {
    galleryIndex++;
    galleryScrollToIndex(false);
  }
}
function openGallery(index) {
  var gallery = document.getElementById("gallery");
  gallery.style.display = "block";
  document.body.style.overflow = "hidden";
  galleryIndex = Math.max(0, Math.min(index, galleryImageCount() - 1));
  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      galleryScrollToIndex(true);
    });
  });
}
function closeGallery() {
  document.getElementById("gallery").style.display = "none";
  document.body.style.overflow = "";
}

function syncOneVideoFsUi(wrap) {
  var fsEl =
    document.fullscreenElement ||
    document.webkitFullscreenElement ||
    document.mozFullScreenElement;
  var native = fsEl === wrap;
  var fake = wrap.classList.contains("fs-fake");
  var active = native || fake;
  var playBtn = wrap.querySelector(".video-fs-play");
  var closeBtn = wrap.querySelector(".video-fs-close");
  if (playBtn) playBtn.hidden = active;
  if (closeBtn) closeBtn.hidden = !active;
}
function syncAllVideoFsUi() {
  document.querySelectorAll(".video-fs-wrap").forEach(syncOneVideoFsUi);
}
function openVideoFullscreen(wrap) {
  var video = wrap.querySelector("video");
  var after = function () {
    syncOneVideoFsUi(wrap);
    if (video) video.play().catch(function () {});
  };
  var req =
    wrap.requestFullscreen ||
    wrap.webkitRequestFullscreen ||
    wrap.mozRequestFullScreen;
  if (req) {
    Promise.resolve(req.call(wrap))
      .then(after)
      .catch(function () {
        wrap.classList.add("fs-fake");
        document.body.style.overflow = "hidden";
        after();
      });
  } else {
    wrap.classList.add("fs-fake");
    document.body.style.overflow = "hidden";
    after();
  }
}
function closeVideoFullscreen(wrap) {
  var fsEl =
    document.fullscreenElement ||
    document.webkitFullscreenElement ||
    document.mozFullScreenElement;
  if (fsEl === wrap) {
    var ex =
      document.exitFullscreen ||
      document.webkitExitFullscreen ||
      document.mozCancelFullScreen;
    if (ex) Promise.resolve(ex.call(document)).catch(function () {});
  }
  wrap.classList.remove("fs-fake");
  document.body.style.overflow = "";
  syncOneVideoFsUi(wrap);
}
function initVideoFullscreenControls() {
  document.querySelectorAll(".video-fs-wrap").forEach(function (wrap) {
    if (wrap.dataset.videoFsInit === "1") return;
    wrap.dataset.videoFsInit = "1";
    var playBtn = wrap.querySelector(".video-fs-play");
    var closeBtn = wrap.querySelector(".video-fs-close");
    if (playBtn) {
      playBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        e.preventDefault();
        openVideoFullscreen(wrap);
      });
    }
    if (closeBtn) {
      closeBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        e.preventDefault();
        closeVideoFullscreen(wrap);
      });
    }
    syncOneVideoFsUi(wrap);
  });
}
document.addEventListener("fullscreenchange", syncAllVideoFsUi);
document.addEventListener("webkitfullscreenchange", syncAllVideoFsUi);
document.addEventListener("mozfullscreenchange", syncAllVideoFsUi);
document.addEventListener("keydown", function (e) {
  if (e.key !== "Escape") return;
  document.querySelectorAll(".video-fs-wrap.fs-fake").forEach(closeVideoFullscreen);
});
initVideoFullscreenControls();
</script>

</body>
</html>
